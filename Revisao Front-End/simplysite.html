<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Your Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- LINK DO CSS (ESSENCIAL) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone">

    <!-- TOPO -->
    <div class="top">
        <span>☰</span>
        <h2>Your Cart</h2>
        <span>🔒</span>
    </div>

    <!-- ITEM -->
    <div class="item">
        <img src="https://i.imgur.com/8Km9tLL.png" alt="Espresso">

        <div class="info">
            <h3>Espresso</h3>
            <p>Small</p>

            <div class="qty">
                <button>-</button>
                <span>2</span>
                <button>+</button>
            </div>
        </div>

        <strong>R$10,00</strong>
    </div>

    <!-- BOTÃO -->
    <button class="add">+ Add More Items</button>

    <!-- RESUMO -->
    <div class="resume">
        <div><span>Subtotal</span><span>R$10,00</span></div>
        <div><span>Tax</span><span>R$1,00</span></div>
        <div class="total"><span>Total</span><span>R$12,00</span></div>
    </div>

    <!-- CHECKOUT -->
    <button class="checkout">Proceed to Checkout</button>

    <!-- MENU -->
    <div class="menu">
        <span>🏠</span>
        <span>👜</span>
        <span>❤️</span>
        <span>👤</span>
    </div>

</div>

</body>
</html>
